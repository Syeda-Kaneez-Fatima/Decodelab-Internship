<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Image Galaxy | Interactive Image Gallery</title>
    <meta name="description" content="A responsive, accessible image gallery with search, category filters, and a keyboard-navigable lightbox.">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <a class="skip-link" href="#main-content">Skip to main content</a>

    <div class="gallery-container">

        <!-- ============ HEADER / NAV (Semantic landmark) ============ -->
        <header class="site-header">
            <div class="navbar">
                <div class="gallery-header">
                    <h1 class="glow-text">Image Galaxy</h1>
                    <p class="typing-text">deep • aesthetic • immersive</p>
                </div>

                <!-- Hamburger trigger — visible only on small screens -->
                <button type="button"
                        class="js-nav-toggle nav-toggle"
                        aria-expanded="false"
                        aria-controls="primaryControls"
                        aria-label="Open search and filters">
                    <span class="nav-toggle-bar"></span>
                    <span class="nav-toggle-bar"></span>
                    <span class="nav-toggle-bar"></span>
                </button>

                <nav class="filter-section js-primary-controls" id="primaryControls" aria-label="Gallery search and filters">
                    <div class="search-wrapper">
                        <label for="searchInput" class="visually-hidden">Search images by title</label>
                        <input type="search"
                               id="searchInput"
                               name="searchInput"
                               placeholder="Search images..."
                               class="search-input"
                               autocomplete="off">
                    </div>

                    <div class="filter-bar" id="filterBar" role="group" aria-label="Filter by category">
                        <button type="button" class="filter-btn is-active" data-filter="all" aria-pressed="true">All</button>
                        <button type="button" class="filter-btn" data-filter="nature" aria-pressed="false">Nature</button>
                        <button type="button" class="filter-btn" data-filter="urban" aria-pressed="false">Urban</button>
                        <button type="button" class="filter-btn" data-filter="portrait" aria-pressed="false">Portrait</button>
                        <button type="button" class="filter-btn" data-filter="abstract" aria-pressed="false">Abstract</button>
                    </div>
                </nav>
            </div>
        </header>

        <!-- ============ MAIN CONTENT (Semantic landmark) ============ -->
        <main id="main-content">
            <h2 class="visually-hidden">Image Results</h2>
            <section class="gallery-grid js-gallery-grid" id="galleryGrid" aria-live="polite" aria-busy="false">
                <!-- Gallery cards injected by JS -->
            </section>
        </main>

        <!-- ============ FOOTER (Semantic landmark) ============ -->
        <footer class="site-footer">
            <p>&copy; <span class="js-year"></span> Image Galaxy. Built for DecodeLabs Frontend Development Project 1–3.</p>
        </footer>
    </div>

    <!-- ============ LIGHTBOX (ARIA dialog) ============ -->
    <div id="lightboxModal"
         class="lightbox js-lightbox"
         role="dialog"
         aria-modal="true"
         aria-label="Image preview"
         aria-hidden="true">
        <button type="button" class="close-lightbox js-close-lightbox" aria-label="Close image preview">✕</button>
        <button type="button" class="nav-btn prev-btn js-prev-light" aria-label="Previous image">‹</button>
        <div class="lightbox-content">
            <img class="lightbox-img" id="lightboxImage" src="" alt="" width="900" height="700">
            <p class="lightbox-caption" id="lightboxCaption"></p>
            <p class="image-counter" id="imageCounter" aria-live="polite"></p>
        </div>
        <button type="button" class="nav-btn next-btn js-next-light" aria-label="Next image">›</button>
    </div>

    <!-- ============ BACK TO TOP ============ -->
    <button type="button" id="backToTop" class="back-to-top js-back-to-top" aria-label="Back to top">⬆</button>

    <script src="script.js"></script>
</body>
</html>
